name: docker-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Manual image tag (e.g. v0.2.0 or rc-20260405)"
        required: false
        default: ""

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release variables
        id: vars
        shell: bash
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner_lc}/folder-organizer"

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            {
              echo "tags<<EOF"
              echo "${image}:${tag}"
              echo "${image}:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            manual_tag="${{ inputs.image_tag }}"
            if [[ -z "$manual_tag" ]]; then
              manual_tag="manual-${GITHUB_RUN_NUMBER}"
            fi
            {
              echo "tags<<EOF"
              echo "${image}:${manual_tag}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          platforms: linux/amd64,linux/arm64
